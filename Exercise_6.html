<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Reset basic spacing and apply background */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: #fff;

  /* Center content using Flexbox */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main container styling */
.container {
  background-color: #1a1a2e;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
  text-align: center;
}

/* Headings */
h1 {
  margin-bottom: 20px;
}

/* Labels */
label {
  display: block;
  margin-top: 10px;
  text-align: left;
}

/* Input fields */
input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* Focus effect for inputs */
input:focus {
  border: 2px solid #00d4ff;
  background-color: #222;
}

/* Button styling */
button {
  margin-top: 20px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 6px;
  background-color: #00d4ff;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

/* Hover effect for button */
button:hover {
  background-color: #00aacc;
}

/* Result text */
#result {
  margin-top: 20px;
  font-size: 18px;
}
    </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Petrol Calculator</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h1>Petrol Calculator</h1>

    <label for="cost">Cost per Liter ($):</label>
    <input 
      type="number" 
      id="cost" 
      value="1.72" 
      step="0.01"
    >

    <label for="liters">Liters Purchased:</label>
    <input 
      type="number" 
      id="liters" 
      value="0" 
      step="0.01"
    >

    <button id="calculateBtn">Calculate Total</button>

    <p id="result">Total Cost: $0.00</p>

  </div>

  <script src="JVS.js"></script>

</body>
</html>
